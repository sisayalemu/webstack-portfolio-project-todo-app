name: Deploy to Server

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Deploy to server
      uses: appleboy/ssh-action@v0.1.5
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        script: |
          cd /home/dev/project/SisayA-todo-app
          
          # Fix git permissions
          git config --global --add safe.directory /home/dev/project/SisayA-todo-app
          
          # Pull latest changes
          git pull origin main
          
          # Fix ownership and permissions
          sudo chown -R $USER:$USER /home/dev/project/SisayA-todo-app
          sudo chmod -R 755 /home/dev/project/SisayA-todo-app
          
          # Install and build backend
          cd backend
          npm install
          npm run build
          
          # Install and build frontend
          cd ../frontend
          npm install
          npm run build
          
          # Restart backend with PM2
          cd ../backend
          pm2 restart todo-app-backend || pm2 start dist/index.js --name todo-app-backend
          
          # Serve frontend files with PM2
          cd ../frontend
          pm2 restart todo-app-frontend || pm2 serve dist 3001 --name todo-app-frontend --spa
          
          echo "Deployment completed successfully!"
